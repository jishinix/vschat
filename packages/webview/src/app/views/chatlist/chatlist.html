<app-chat-overlay>
    @for(chat of chats(); track chat.id) {
    <div class="chatListItem" (click)="openChat(chat)">
        {{ chat.name }}
        @if(chat.unreadedMsgs > 0){
        <span class="unreadetMessages">{{chat.unreadedMsgs}}</span>
        }
    </div>

    } @empty {
    <div class="chat-list-add-friends-button-wrapper">
        <p>Keine Aktiven Chats Vorhanden</p>
        <button class="btn-primary" (click)="navigation.switchView('friends')">
            Freunde Hinzufügen
        </button>
    </div>
    }
</app-chat-overlay>
