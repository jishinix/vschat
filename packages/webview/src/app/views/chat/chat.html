<app-chat-overlay>
    @if (navigation.extradata.chatId()) {
    <div #chatWrapper class="chatWrapper">
        <app-chat-log [chat]="chat()" (initFetchComplete)="handleInitFetch($event)"></app-chat-log>

        <app-chat-box (enterPressed)="sendMsg()" [(value)]="message"></app-chat-box>
    </div>
    } @else {
    <p>Kein Chat ausgewählt</p>
    }
</app-chat-overlay>
