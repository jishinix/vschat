<div #tab class="collapsible-tab" [class.active]="active">
    <div class="collabsible-tab-header">
        <svg (click)="active = !active" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960"
            fill="#fff">
            <path d="m321-80-71-71 329-329-329-329 71-71 400 400L321-80Z" />
        </svg>
        @if(arrowOnly){
        <div (click)="clickText.emit()">{{header}}</div>
        } @else{
        <div (click)="active = !active">{{header}}</div>
        }

    </div>
    <div class="contentWrapper">
        <div>
            <ng-content></ng-content>
        </div>
    </div>
</div>
